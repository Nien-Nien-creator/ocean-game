<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>海洋守護者</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#0a1628;color:#fff;overflow:hidden;height:100vh;width:100vw;}
#game{width:100%;height:100vh;position:relative;overflow:hidden;}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.screen.hidden{display:none;}
#title-screen{background:linear-gradient(180deg,#0a1628 0%,#0d2b4a 50%,#0a3d2e 100%);}
.wave-bg{position:absolute;bottom:0;width:100%;height:40%;background:linear-gradient(180deg,transparent,#0d4a6e44);}
.title-logo{font-size:clamp(22px,5vw,38px);font-weight:700;color:#7ee8fa;margin-bottom:8px;text-align:center;}
.title-sub{font-size:clamp(13px,3vw,18px);color:#a8e6d4;margin-bottom:32px;text-align:center;}
.turtle-icon{font-size:clamp(60px,15vw,100px);margin-bottom:16px;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
.btn{background:linear-gradient(135deg,#1a8c6e,#0f6b9a);border:2px solid #7ee8fa88;color:#fff;padding:14px 36px;border-radius:50px;font-size:clamp(15px,3.5vw,20px);cursor:pointer;margin:6px;font-weight:600;transition:transform .15s;box-shadow:0 4px 20px #0f6b9a55;display:inline-block;}
.btn:hover{transform:scale(1.05);}
.btn:active{transform:scale(.95);}
.btn-small{padding:10px 24px;font-size:clamp(13px,2.8vw,16px);}
#level-screen{background:linear-gradient(180deg,#0a1628,#0d2b4a);}
.level-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;width:100%;max-width:420px;}
.level-card{background:#ffffff11;border:2px solid #7ee8fa44;border-radius:16px;padding:16px 8px;text-align:center;cursor:pointer;transition:all .2s;}
.level-card.unlocked{border-color:#7ee8fa99;}
.level-card.unlocked:hover{transform:scale(1.05);}
.level-card.unlocked:active{transform:scale(.95);}
.level-card.locked{opacity:.5;cursor:not-allowed;}
.lc-icon{font-size:clamp(28px,7vw,44px);}
.lc-name{font-size:clamp(11px,2.5vw,14px);color:#a8e6d4;margin-top:6px;font-weight:600;}
.stars{color:#ffd700;font-size:clamp(10px,2.2vw,13px);margin-top:4px;}
.section-title{font-size:clamp(16px,3.5vw,22px);color:#7ee8fa;font-weight:700;margin-bottom:20px;text-align:center;}
.topbar{position:absolute;top:0;left:0;right:0;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,#0a162899,transparent);z-index:10;}
.hud-stars{color:#ffd700;font-size:clamp(14px,3vw,18px);font-weight:700;}
.hud-level{color:#7ee8fa;font-size:clamp(12px,2.5vw,15px);}
.hud-back{background:none;border:1px solid #7ee8fa44;color:#a8e6d4;padding:6px 14px;border-radius:20px;font-size:clamp(11px,2.3vw,13px);cursor:pointer;}
.progbar{position:absolute;top:48px;left:16px;right:16px;height:8px;background:#ffffff22;border-radius:4px;z-index:10;}
.progfill{height:100%;background:linear-gradient(90deg,#1a8c6e,#7ee8fa);border-radius:4px;transition:width .5s;width:0%;}
#level1-screen{background:linear-gradient(180deg,#87ceeb 0%,#87ceeb 50%,#c8a96e 50%,#c8a96e 100%);}
.trash-items{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;padding:10px;max-width:480px;}
.trash-item{font-size:clamp(28px,8vw,48px);cursor:grab;user-select:none;padding:8px;border-radius:12px;background:#ffffff33;border:2px dashed #ffffff66;transition:transform .1s;}
.trash-item.collected{opacity:.3;pointer-events:none;}
.bins{display:flex;justify-content:center;gap:16px;padding:10px;}
.bin{width:clamp(70px,18vw,100px);height:clamp(70px,18vw,100px);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:clamp(28px,7vw,40px);border:3px solid transparent;transition:all .2s;cursor:pointer;}
.bin.plastic{background:#1a6bbf44;border-color:#1a6bbf;}
.bin.organic{background:#2d7a2d44;border-color:#2d7a2d;}
.bin.general{background:#8c6d2f44;border-color:#8c6d2f;}
.bin.highlight{border-color:#ffd700;box-shadow:0 0 20px #ffd70088;transform:scale(1.08);}
.bin-label{font-size:clamp(9px,2vw,11px);color:#fff;margin-top:4px;font-weight:600;}
.l1-top{display:flex;flex-direction:column;align-items:center;padding:70px 0 0;flex:1;}
.l1-bottom{display:flex;flex-direction:column;align-items:center;padding:0 0 10px;}
.l1-instruction{font-size:clamp(12px,2.8vw,15px);color:#333;text-align:center;margin-bottom:8px;font-weight:600;background:#ffffff88;padding:6px 16px;border-radius:20px;}
#level2-screen{background:linear-gradient(180deg,#0a4a7a 0%,#0d6b8e 60%,#0a3d5a 100%);}
.ocean-floor{position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(180deg,#1a5c3a,#0f3d26);}
.trash-ocean{position:absolute;cursor:pointer;font-size:clamp(24px,6vw,36px);transition:all .3s;}
.trash-ocean:active{transform:scale(1.3);}
@keyframes pop{0%{transform:scale(1);}50%{transform:scale(1.5);opacity:1;}100%{transform:scale(0);opacity:0;}}
.animal{position:absolute;font-size:clamp(22px,5.5vw,34px);animation:swim 8s linear infinite;}
@keyframes swim{0%{transform:translateX(110vw) scaleX(-1);}100%{transform:translateX(-20vw) scaleX(-1);}}
.l2-instruction{position:absolute;top:80px;left:50%;transform:translateX(-50%);font-size:clamp(12px,2.8vw,15px);color:#a8e6d4;text-align:center;font-weight:600;background:#00000044;padding:6px 16px;border-radius:20px;white-space:nowrap;z-index:5;}
.l2-counter{position:absolute;top:120px;left:50%;transform:translateX(-50%);font-size:clamp(14px,3.5vw,18px);color:#ffd700;font-weight:700;z-index:5;}
#level3-screen{background:linear-gradient(180deg,#062d1a 0%,#0a4a2e 100%);}
.quiz-card{background:#ffffff11;border:2px solid #7ee8fa44;border-radius:20px;padding:20px;max-width:440px;width:100%;margin:0 auto;}
.quiz-q{font-size:clamp(14px,3.2vw,18px);color:#fff;font-weight:600;margin-bottom:16px;line-height:1.5;text-align:center;}
.quiz-options{display:flex;flex-direction:column;gap:10px;}
.quiz-opt{background:#ffffff11;border:2px solid #7ee8fa33;border-radius:12px;padding:12px 16px;color:#a8e6d4;font-size:clamp(12px,2.8vw,15px);cursor:pointer;text-align:left;transition:all .2s;font-family:inherit;width:100%;}
.quiz-opt:hover{background:#ffffff22;}
.quiz-opt.correct{background:#1a8c6e44;border-color:#1a8c6e;color:#7ee8fa;}
.quiz-opt.wrong{background:#8c1a1a44;border-color:#8c1a1a;color:#f4a5a5;}
.quiz-fact{margin-top:14px;padding:12px;background:#7ee8fa11;border-radius:12px;color:#a8e6d4;font-size:clamp(11px,2.5vw,14px);line-height:1.6;text-align:center;}
.quiz-nav{display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
.quiz-progress{color:#7ee8fa;font-size:clamp(12px,2.5vw,14px);}
.coral-deco{position:absolute;font-size:clamp(24px,6vw,40px);}
#result-screen{background:linear-gradient(180deg,#0a1628,#0d3322);}
.result-stars{font-size:clamp(36px,9vw,56px);margin:10px 0;}
.result-title{font-size:clamp(18px,4.5vw,28px);color:#7ee8fa;font-weight:700;margin-bottom:8px;text-align:center;}
.result-fact{background:#7ee8fa11;border:1px solid #7ee8fa33;border-radius:16px;padding:14px 18px;max-width:400px;color:#a8e6d4;font-size:clamp(12px,2.8vw,15px);line-height:1.6;text-align:center;margin:12px 0 20px;}
.result-fact-title{color:#ffd700;font-weight:700;margin-bottom:6px;font-size:clamp(13px,3vw,16px);}
#notif{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1a8c6ecc;color:#fff;padding:12px 24px;border-radius:20px;font-size:clamp(14px,3vw,18px);font-weight:700;pointer-events:none;opacity:0;transition:opacity .3s;z-index:999;}
</style>
</head>
<body>
<div id="game">

<!-- TITLE -->
<div class="screen" id="title-screen">
  <div class="wave-bg"></div>
  <div class="turtle-icon">🐢</div>
  <div class="title-logo">🌊 海洋守護者</div>
  <div class="title-sub">拯救藍色星球</div>
  <button class="btn" id="btn-start">開始冒險！</button>
  <button class="btn btn-small" id="btn-howto">怎麼玩？</button>
</div>

<!-- LEVEL SELECT -->
<div class="screen hidden" id="level-screen">
  <div class="section-title">🗺️ 選擇關卡</div>
  <div class="level-grid">
    <div class="level-card unlocked" id="lcard-1">
      <div class="lc-icon">🏖️</div>
      <div class="lc-name">第1關<br>海灘清理</div>
      <div class="stars" id="stars-1">☆☆☆</div>
    </div>
    <div class="level-card locked" id="lcard-2">
      <div class="lc-icon">🌊</div>
      <div class="lc-name">第2關<br>深海任務</div>
      <div class="stars" id="stars-2">☆☆☆</div>
    </div>
    <div class="level-card locked" id="lcard-3">
      <div class="lc-icon">🪸</div>
      <div class="lc-name">第3關<br>珊瑚問答</div>
      <div class="stars" id="stars-3">☆☆☆</div>
    </div>
  </div>
  <div style="margin-top:20px;color:#a8e6d4;font-size:clamp(12px,2.5vw,14px);">總星星：<span id="total-stars-display">0</span> ⭐</div>
</div>

<!-- LEVEL 1 -->
<div class="screen hidden" id="level1-screen">
  <div class="topbar">
    <button class="hud-back" id="l1-back">◀ 返回</button>
    <div class="hud-level">第1關 海灘清理</div>
    <div class="hud-stars">⭐ <span id="l1-stars">0</span></div>
  </div>
  <div class="progbar"><div class="progfill" id="l1-progfill"></div></div>
  <div class="l1-top">
    <div class="l1-instruction">把垃圾拖到正確的垃圾桶！</div>
    <div class="trash-items" id="trash-items-container"></div>
  </div>
  <div class="l1-bottom">
    <div class="bins">
      <div class="bin plastic" id="bin-plastic">♻️<div class="bin-label">塑膠回收</div></div>
      <div class="bin organic" id="bin-organic">🍃<div class="bin-label">廚餘有機</div></div>
      <div class="bin general" id="bin-general">🗑️<div class="bin-label">一般垃圾</div></div>
    </div>
  </div>
</div>

<!-- LEVEL 2 -->
<div class="screen hidden" id="level2-screen">
  <div class="topbar">
    <button class="hud-back" id="l2-back">◀ 返回</button>
    <div class="hud-level">第2關 深海任務</div>
    <div class="hud-stars">⭐ <span id="l2-stars">0</span></div>
  </div>
  <div class="progbar"><div class="progfill" id="l2-progfill"></div></div>
  <div class="l2-instruction">點擊海洋中的垃圾來清理！</div>
  <div class="l2-counter">已清理：<span id="l2-count">0</span> / <span id="l2-total">0</span></div>
  <div class="ocean-floor"></div>
  <div id="l2-items"></div>
</div>

<!-- LEVEL 3 -->
<div class="screen hidden" id="level3-screen">
  <div class="topbar">
    <button class="hud-back" id="l3-back">◀ 返回</button>
    <div class="hud-level">第3關 珊瑚問答</div>
    <div class="hud-stars">⭐ <span id="l3-stars">0</span></div>
  </div>
  <div class="coral-deco" style="bottom:10px;left:5%">🪸</div>
  <div class="coral-deco" style="bottom:10px;right:8%">🪸</div>
  <div class="coral-deco" style="bottom:10px;left:35%">🐚</div>
  <div id="quiz-container" style="width:100%;max-width:480px;padding:0 12px;margin-top:60px;overflow-y:auto;max-height:calc(100vh - 80px);"></div>
</div>

<!-- RESULT -->
<div class="screen hidden" id="result-screen">
  <div style="font-size:clamp(50px,12vw,80px);margin-bottom:4px;">🐢</div>
  <div class="result-stars" id="result-stars-display">⭐⭐⭐</div>
  <div class="result-title" id="result-title">太棒了！</div>
  <div class="result-fact" id="result-fact-box"></div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
    <button class="btn btn-small" id="next-btn">下一關 ➡️</button>
    <button class="btn btn-small" id="menu-btn">關卡選擇</button>
  </div>
</div>

<div id="notif"></div>
</div>

<script>
var S = {stars:[0,0,0], unlocked:[true,false,false]};
var curLevel=0, dragEl=null, dragOff={x:0,y:0}, l1Done=0, l2Done=0, l2Total=0, l2Stars=0, qIdx=0, qStars=0, qAnswered=false;

var TRASH=[
  {emoji:'🧴',label:'塑膠瓶',type:'plastic'},
  {emoji:'🛍️',label:'塑膠袋',type:'plastic'},
  {emoji:'🥤',label:'塑膠杯',type:'plastic'},
  {emoji:'🍌',label:'香蕉皮',type:'organic'},
  {emoji:'🥚',label:'蛋殼',type:'organic'},
  {emoji:'📰',label:'廢紙',type:'general'},
  {emoji:'💡',label:'舊燈泡',type:'general'},
  {emoji:'🧃',label:'果汁盒',type:'plastic'}
];
var OCEAN_TRASH=['🧴','🛍️','🥤','🎣','🥫','🧻','🪣'];
var QUIZ=[
  {q:'每年大約有多少塑膠垃圾流入海洋？',opts:['1萬噸','8百萬噸','50噸','100萬噸'],ans:1,fact:'🌊 每年約有800萬噸的塑膠垃圾進入海洋，相當於每分鐘倒入一卡車的塑膠！'},
  {q:'塑膠袋在海洋中分解需要多久？',opts:['1年','10年','100-500年','1個月'],ans:2,fact:'⏳ 一個塑膠袋在海洋中需要100到500年才能分解，期間還會釋放有毒物質！'},
  {q:'下列哪個行動最能減少海洋塑膠污染？',opts:['多用免洗餐具','自備購物袋和水壺','把垃圾丟入海中','多買瓶裝水'],ans:1,fact:'♻️ 自備購物袋和水壺是最有效的減塑方式，每人每年可減少數百個塑膠袋和瓶子！'},
  {q:'哪種動物最容易因塑膠袋而受傷？',opts:['海豚','海龜','鯊魚','螃蟹'],ans:1,fact:'🐢 海龜常把塑膠袋誤認為水母吃下去，導致窒息或腸胃阻塞，非常危險！'},
  {q:'「微塑膠」是什麼？',opts:['很大的塑膠','5mm以下的微小塑膠顆粒','可分解的塑膠','彩色塑膠'],ans:1,fact:'🔬 微塑膠是5毫米以下的細小塑膠，已經在魚類、飲用水甚至人體血液中被發現！'}
];
var FACTS=[
  {title:'🏖️ 海灘清理小知識',text:'每年全球有超過1000萬噸垃圾流入海洋。參與淨灘活動，可以直接保護海洋生態！'},
  {title:'🌊 深海任務小知識',text:'塑膠垃圾會纏住魚類、海龜和海鳥。海洋中已有超過5兆件塑膠垃圾，需要大家一起清理！'},
  {title:'🪸 珊瑚礁小知識',text:'珊瑚礁只佔海洋面積的0.1%，卻孕育了25%的海洋生物。減少塑膠，就是保護珊瑚礁的家！'}
];

function showScreen(id){
  var screens=document.querySelectorAll('.screen');
  for(var i=0;i<screens.length;i++) screens[i].classList.add('hidden');
  document.getElementById(id).classList.remove('hidden');
}

function notify(msg){
  var n=document.getElementById('notif');
  n.textContent=msg;
  n.style.opacity='1';
  setTimeout(function(){n.style.opacity='0';},1200);
}

function updateLevelCards(){
  var map=['☆☆☆','⭐☆☆','⭐⭐☆','⭐⭐⭐'];
  for(var i=1;i<=3;i++){
    var el=document.getElementById('stars-'+i);
    if(el) el.textContent=map[S.stars[i-1]];
    var card=document.getElementById('lcard-'+i);
    if(card){
      if(S.unlocked[i-1]){card.classList.remove('locked');card.classList.add('unlocked');}
      else{card.classList.add('locked');card.classList.remove('unlocked');}
    }
  }
  document.getElementById('total-stars-display').textContent=S.stars[0]+S.stars[1]+S.stars[2];
}

// Button events
document.getElementById('btn-start').addEventListener('click', function(){showScreen('level-screen');updateLevelCards();});
document.getElementById('btn-howto').addEventListener('click', function(){alert('🌊 怎麼玩？\n\n第1關：把垃圾拖到正確的垃圾桶\n第2關：點擊海洋中的垃圾清理乾淨\n第3關：回答海洋保護的問題\n\n每關最多得3顆星！\n收集星星，解鎖下一關！🐢');});
document.getElementById('l1-back').addEventListener('click', function(){showScreen('level-screen');updateLevelCards();});
document.getElementById('l2-back').addEventListener('click', function(){showScreen('level-screen');updateLevelCards();});
document.getElementById('l3-back').addEventListener('click', function(){showScreen('level-screen');updateLevelCards();});
document.getElementById('menu-btn').addEventListener('click', function(){showScreen('level-screen');updateLevelCards();});
document.getElementById('lcard-1').addEventListener('click', function(){startLevel(1);});
document.getElementById('lcard-2').addEventListener('click', function(){if(S.unlocked[1])startLevel(2);else notify('🔒 先完成前一關才能解鎖！');});
document.getElementById('lcard-3').addEventListener('click', function(){if(S.unlocked[2])startLevel(3);else notify('🔒 先完成前一關才能解鎖！');});

function startLevel(n){
  curLevel=n;
  if(n===1) initLevel1();
  else if(n===2) initLevel2();
  else initLevel3();
}

// ====== LEVEL 1 ======
function initLevel1(){
  showScreen('level1-screen');
  l1Done=0;
  document.getElementById('l1-stars').textContent='0';
  document.getElementById('l1-progfill').style.width='0%';
  var c=document.getElementById('trash-items-container');
  c.innerHTML='';
  TRASH.forEach(function(t,i){
    var d=document.createElement('div');
    d.className='trash-item';
    d.dataset.type=t.type;
    d.dataset.idx=i;
    d.title=t.label;
    d.textContent=t.emoji;
    d.draggable=true;
    d.addEventListener('dragstart',function(e){dragEl=e.currentTarget;e.dataTransfer.setData('text',dragEl.dataset.idx);});
    d.addEventListener('touchstart',onTouchStart,{passive:false});
    d.addEventListener('touchmove',onTouchMove,{passive:false});
    d.addEventListener('touchend',onTouchEnd,{passive:false});
    c.appendChild(d);
  });
  var bins=document.querySelectorAll('.bin');
  bins.forEach(function(b){
    b.addEventListener('dragover',function(e){e.preventDefault();b.classList.add('highlight');});
    b.addEventListener('dragleave',function(){b.classList.remove('highlight');});
    b.addEventListener('drop',function(e){
      e.preventDefault();
      document.querySelectorAll('.bin').forEach(function(x){x.classList.remove('highlight');});
      if(dragEl) checkTrash(dragEl, b.dataset.type);
      dragEl=null;
    });
  });
}

function onTouchStart(e){
  e.preventDefault();
  dragEl=e.currentTarget;
  var t=e.touches[0];
  var r=dragEl.getBoundingClientRect();
  dragOff={x:t.clientX-r.left, y:t.clientY-r.top};
  dragEl.style.position='fixed';
  dragEl.style.zIndex='999';
  dragEl.style.pointerEvents='none';
  dragEl.style.left=(t.clientX-dragOff.x)+'px';
  dragEl.style.top=(t.clientY-dragOff.y)+'px';
}
function onTouchMove(e){
  e.preventDefault();
  if(!dragEl) return;
  var t=e.touches[0];
  dragEl.style.left=(t.clientX-dragOff.x)+'px';
  dragEl.style.top=(t.clientY-dragOff.y)+'px';
  var bins=document.querySelectorAll('.bin');
  bins.forEach(function(b){
    var r=b.getBoundingClientRect();
    if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom) b.classList.add('highlight');
    else b.classList.remove('highlight');
  });
}
function onTouchEnd(e){
  if(!dragEl) return;
  dragEl.style.position='';
  dragEl.style.zIndex='';
  dragEl.style.pointerEvents='';
  dragEl.style.left='';
  dragEl.style.top='';
  var t=e.changedTouches[0];
  var bins=document.querySelectorAll('.bin');
  var hit=null;
  bins.forEach(function(b){
    b.classList.remove('highlight');
    var r=b.getBoundingClientRect();
    if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom) hit=b;
  });
  if(hit) checkTrash(dragEl, hit.dataset.type);
  dragEl=null;
}

function checkTrash(item, binType){
  if(item.classList.contains('collected')) return;
  if(item.dataset.type===binType){
    item.classList.add('collected');
    notify('✅ 答對了！');
    l1Done++;
    var stars=l1Done<=4?1:l1Done<=6?2:3;
    document.getElementById('l1-stars').textContent=stars;
    document.getElementById('l1-progfill').style.width=(l1Done/TRASH.length*100)+'%';
    if(l1Done>=TRASH.length){
      var earned=l1Done>=8?3:l1Done>=6?2:1;
      setTimeout(function(){showResult(1,earned);},600);
    }
  } else {
    notify('❌ 再想想看！');
  }
}

// ====== LEVEL 2 ======
function initLevel2(){
  showScreen('level2-screen');
  l2Done=0; l2Stars=0;
  document.getElementById('l2-stars').textContent='0';
  document.getElementById('l2-progfill').style.width='0%';
  var c=document.getElementById('l2-items');
  c.innerHTML='';
  var total=8;
  l2Total=total;
  document.getElementById('l2-total').textContent=total;
  document.getElementById('l2-count').textContent='0';
  for(var i=0;i<total;i++){
    (function(){
      var emoji=OCEAN_TRASH[Math.floor(Math.random()*OCEAN_TRASH.length)];
      var el=document.createElement('div');
      el.className='trash-ocean';
      el.textContent=emoji;
      el.style.left=Math.round(Math.random()*75+5)+'vw';
      el.style.top=Math.round(Math.random()*45+20)+'vh';
      el.addEventListener('click',function(){removeTrash(el);});
      el.addEventListener('touchstart',function(e){e.preventDefault();removeTrash(el);},{passive:false});
      c.appendChild(el);
    })();
  }
  var animals=['🐠','🐬','🐟'];
  animals.forEach(function(a,i){
    var el=document.createElement('div');
    el.className='animal';
    el.textContent=a;
    el.style.top=(30+i*15)+'vh';
    el.style.animationDelay=(i*2.5)+'s';
    c.appendChild(el);
  });
}

function removeTrash(el){
  if(el.dataset.removed) return;
  el.dataset.removed='1';
  el.style.animation='pop .4s forwards';
  l2Done++;
  var s=l2Done<=3?1:l2Done<=5?2:3;
  l2Stars=s;
  document.getElementById('l2-stars').textContent=s;
  document.getElementById('l2-count').textContent=l2Done;
  document.getElementById('l2-progfill').style.width=(l2Done/l2Total*100)+'%';
  notify('🌊 清理成功！');
  setTimeout(function(){
    if(el.parentNode) el.parentNode.removeChild(el);
  },500);
  if(l2Done>=l2Total){
    setTimeout(function(){showResult(2,l2Stars);},700);
  }
}

// ====== LEVEL 3 ======
function initLevel3(){
  showScreen('level3-screen');
  qIdx=0; qStars=0; qAnswered=false;
  document.getElementById('l3-stars').textContent='0';
  renderQuiz();
}
function renderQuiz(){
  if(qIdx>=QUIZ.length){setTimeout(function(){showResult(3,qStars);},400);return;}
  var q=QUIZ[qIdx];
  var c=document.getElementById('quiz-container');
  var optsHTML='';
  for(var i=0;i<q.opts.length;i++){
    optsHTML+='<button class="quiz-opt" data-idx="'+i+'">'+q.opts[i]+'</button>';
  }
  c.innerHTML='<div class="quiz-card"><div class="quiz-q">'+q.q+'</div><div class="quiz-options">'+optsHTML+'</div><div class="quiz-fact" id="quiz-fact" style="display:none"></div><div class="quiz-nav"><div class="quiz-progress">問題 '+(qIdx+1)+' / '+QUIZ.length+'</div><button class="btn btn-small" id="qnext" style="display:none">下一題 ➡️</button></div></div>';
  qAnswered=false;
  var opts=c.querySelectorAll('.quiz-opt');
  opts.forEach(function(o){
    o.addEventListener('click',function(){answerQ(parseInt(o.dataset.idx));});
  });
  var nxt=document.getElementById('qnext');
  if(nxt) nxt.addEventListener('click',function(){qIdx++;renderQuiz();});
}
function answerQ(i){
  if(qAnswered) return;
  qAnswered=true;
  var q=QUIZ[qIdx];
  var opts=document.querySelectorAll('.quiz-opt');
  opts.forEach(function(o,idx){
    o.disabled=true;
    if(idx===q.ans) o.classList.add('correct');
    else if(idx===i) o.classList.add('wrong');
  });
  if(i===q.ans){notify('🎉 答對了！');qStars=Math.min(3,qStars+1);document.getElementById('l3-stars').textContent=qStars;}
  else notify('💡 再加油！');
  document.getElementById('quiz-fact').style.display='block';
  document.getElementById('quiz-fact').textContent=q.fact;
  var nxt=document.getElementById('qnext');
  if(nxt) nxt.style.display='inline-block';
}

// ====== RESULT ======
function showResult(level, stars){
  S.stars[level-1]=Math.max(S.stars[level-1],stars);
  if(level<3) S.unlocked[level]=true;
  var starsStr=['','⭐','⭐⭐','⭐⭐⭐'][stars];
  var titles=['','🎉 完成海灘清理！','🌊 深海任務成功！','🪸 珊瑚問答完成！'];
  document.getElementById('result-stars-display').textContent=starsStr;
  document.getElementById('result-title').textContent=titles[level];
  var f=FACTS[level-1];
  document.getElementById('result-fact-box').innerHTML='<div class="result-fact-title">'+f.title+'</div>'+f.text;
  var nb=document.getElementById('next-btn');
  nb.style.display=level<3?'inline-block':'none';
  nb.onclick=function(){startLevel(level+1);};
  showScreen('result-screen');
  updateLevelCards();
}

updateLevelCards();
</script>
