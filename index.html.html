<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>海洋守護者</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#0a1628;color:#fff;overflow:hidden;height:100vh;width:100vw;touch-action:none;}
#game{width:100%;height:100vh;position:relative;overflow:hidden;}

/* screens */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .4s;padding:20px;}
.screen.hidden{opacity:0;pointer-events:none;}

/* title screen */
#title-screen{background:linear-gradient(180deg,#0a1628 0%,#0d2b4a 50%,#0a3d2e 100%);}
.wave-bg{position:absolute;bottom:0;width:100%;height:40%;background:linear-gradient(180deg,transparent,#0d4a6e88,#0a6b5d44);}
.title-logo{font-size:clamp(22px,5vw,38px);font-weight:700;color:#7ee8fa;text-shadow:0 0 30px #7ee8fa88;margin-bottom:8px;text-align:center;}
.title-sub{font-size:clamp(13px,3vw,18px);color:#a8e6d4;margin-bottom:32px;text-align:center;}
.turtle-icon{font-size:clamp(60px,15vw,100px);margin-bottom:16px;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}

/* buttons */
.btn{background:linear-gradient(135deg,#1a8c6e,#0f6b9a);border:2px solid #7ee8fa88;color:#fff;padding:14px 36px;border-radius:50px;font-size:clamp(15px,3.5vw,20px);cursor:pointer;margin:6px;font-weight:600;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 20px #0f6b9a55;}
.btn:active{transform:scale(.95);}
.btn-small{padding:10px 24px;font-size:clamp(13px,2.8vw,16px);}
.btn-red{background:linear-gradient(135deg,#8c1a1a,#9a3d0f);}

/* level select */
#level-screen{background:linear-gradient(180deg,#0a1628,#0d2b4a);}
.level-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;width:100%;max-width:420px;}
.level-card{background:#ffffff11;border:2px solid #7ee8fa44;border-radius:16px;padding:16px 8px;text-align:center;cursor:pointer;transition:all .2s;position:relative;}
.level-card.unlocked{border-color:#7ee8fa99;}
.level-card.unlocked:active{transform:scale(.95);}
.level-card.locked{opacity:.5;cursor:not-allowed;}
.level-card .lc-icon{font-size:clamp(28px,7vw,44px);}
.level-card .lc-name{font-size:clamp(11px,2.5vw,14px);color:#a8e6d4;margin-top:6px;font-weight:600;}
.level-card .stars{color:#ffd700;font-size:clamp(10px,2.2vw,13px);margin-top:4px;}
.section-title{font-size:clamp(16px,3.5vw,22px);color:#7ee8fa;font-weight:700;margin-bottom:20px;text-align:center;}

/* hud */
#hud{position:absolute;top:0;left:0;right:0;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,#0a162899,transparent);z-index:10;}
.hud-stars{color:#ffd700;font-size:clamp(14px,3vw,18px);font-weight:700;}
.hud-level{color:#7ee8fa;font-size:clamp(12px,2.5vw,15px);}
.hud-back{background:none;border:1px solid #7ee8fa44;color:#a8e6d4;padding:6px 14px;border-radius:20px;font-size:clamp(11px,2.3vw,13px);cursor:pointer;}

/* progress bar */
#progress-bar{position:absolute;top:48px;left:16px;right:16px;height:8px;background:#ffffff22;border-radius:4px;z-index:10;}
#progress-fill{height:100%;background:linear-gradient(90deg,#1a8c6e,#7ee8fa);border-radius:4px;transition:width .5s;}

/* game canvas area */
#game-area{position:absolute;inset:0;top:66px;}

/* ===== LEVEL 1: DRAG & DROP ===== */
#level1-screen{background:linear-gradient(180deg,#87ceeb 0%,#87ceeb 50%,#c8a96e 50%,#c8a96e 100%);}
.trash-items{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;padding:10px;max-width:480px;}
.trash-item{font-size:clamp(28px,8vw,48px);cursor:grab;user-select:none;padding:8px;border-radius:12px;background:#ffffff33;border:2px dashed #ffffff66;transition:transform .1s;touch-action:none;}
.trash-item.dragging{opacity:.7;transform:scale(1.15);z-index:100;}
.trash-item.collected{opacity:.3;pointer-events:none;}
.bins{display:flex;justify-content:center;gap:16px;padding:10px;}
.bin{width:clamp(70px,18vw,100px);height:clamp(70px,18vw,100px);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:clamp(28px,7vw,40px);border:3px solid transparent;transition:all .2s;cursor:pointer;}
.bin.plastic{background:#1a6bbf44;border-color:#1a6bbf;}
.bin.organic{background:#2d7a2d44;border-color:#2d7a2d;}
.bin.general{background:#8c6d2f44;border-color:#8c6d2f;}
.bin.highlight{border-color:#ffd700;box-shadow:0 0 20px #ffd70088;transform:scale(1.08);}
.bin-label{font-size:clamp(9px,2vw,11px);color:#fff;margin-top:4px;font-weight:600;}
.l1-top{display:flex;flex-direction:column;align-items:center;padding:10px 0 0;flex:1;}
.l1-bottom{display:flex;flex-direction:column;align-items:center;padding:0 0 10px;}
.l1-instruction{font-size:clamp(12px,2.8vw,15px);color:#333;text-align:center;margin-bottom:8px;font-weight:600;background:#ffffff88;padding:6px 16px;border-radius:20px;}

/* ===== LEVEL 2: TAP TO CLEAN ===== */
#level2-screen{background:linear-gradient(180deg,#0a4a7a 0%,#0d6b8e 60%,#0a3d5a 100%);}
.ocean-floor{position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(180deg,#1a5c3a,#0f3d26);}
.coral{position:absolute;bottom:60px;font-size:clamp(20px,5vw,30px);}
.trash-ocean{position:absolute;cursor:pointer;font-size:clamp(24px,6vw,36px);transition:all .3s;touch-action:none;}
.trash-ocean:active{transform:scale(1.3);}
.trash-ocean.removed{animation:pop .4s forwards;}
@keyframes pop{0%{transform:scale(1);}50%{transform:scale(1.5);opacity:1;}100%{transform:scale(0);opacity:0;}}
.animal{position:absolute;font-size:clamp(22px,5.5vw,34px);animation:swim 8s linear infinite;}
@keyframes swim{0%{transform:translateX(110vw) scaleX(-1);}100%{transform:translateX(-20vw) scaleX(-1);}}
.fish-help{position:absolute;cursor:pointer;font-size:clamp(26px,6.5vw,38px);animation:helpswim 1s ease-in-out infinite;}
@keyframes helpswim{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.caught-animation{position:absolute;pointer-events:none;font-size:clamp(20px,5vw,30px);animation:caught .6s forwards;}
@keyframes caught{0%{opacity:1;transform:scale(1);}100%{opacity:0;transform:scale(2) translateY(-30px);}}
.l2-instruction{position:absolute;top:80px;left:50%;transform:translateX(-50%);font-size:clamp(12px,2.8vw,15px);color:#a8e6d4;text-align:center;font-weight:600;background:#00000044;padding:6px 16px;border-radius:20px;white-space:nowrap;}
.l2-counter{position:absolute;top:130px;left:50%;transform:translateX(-50%);font-size:clamp(14px,3.5vw,18px);color:#ffd700;font-weight:700;}

/* ===== LEVEL 3: QUIZ ===== */
#level3-screen{background:linear-gradient(180deg,#062d1a 0%,#0a4a2e 100%);}
.quiz-card{background:#ffffff11;border:2px solid #7ee8fa44;border-radius:20px;padding:20px;max-width:440px;width:100%;margin:0 auto;}
.quiz-q{font-size:clamp(14px,3.2vw,18px);color:#fff;font-weight:600;margin-bottom:16px;line-height:1.5;text-align:center;}
.quiz-options{display:flex;flex-direction:column;gap:10px;}
.quiz-opt{background:#ffffff11;border:2px solid #7ee8fa33;border-radius:12px;padding:12px 16px;color:#a8e6d4;font-size:clamp(12px,2.8vw,15px);cursor:pointer;text-align:left;transition:all .2s;font-family:inherit;}
.quiz-opt:active{transform:scale(.98);}
.quiz-opt.correct{background:#1a8c6e44;border-color:#1a8c6e;color:#7ee8fa;}
.quiz-opt.wrong{background:#8c1a1a44;border-color:#8c1a1a;color:#f4a5a5;}
.quiz-fact{margin-top:14px;padding:12px;background:#7ee8fa11;border-radius:12px;color:#a8e6d4;font-size:clamp(11px,2.5vw,14px);line-height:1.6;text-align:center;}
.quiz-nav{display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
.quiz-progress{color:#7ee8fa;font-size:clamp(12px,2.5vw,14px);}
.coral-deco{position:absolute;font-size:clamp(24px,6vw,40px);}

/* result screen */
#result-screen{background:linear-gradient(180deg,#0a1628,#0d3322);}
.result-stars{font-size:clamp(36px,9vw,56px);margin:10px 0;}
.result-title{font-size:clamp(18px,4.5vw,28px);color:#7ee8fa;font-weight:700;margin-bottom:8px;text-align:center;}
.result-fact{background:#7ee8fa11;border:1px solid #7ee8fa33;border-radius:16px;padding:14px 18px;max-width:400px;color:#a8e6d4;font-size:clamp(12px,2.8vw,15px);line-height:1.6;text-align:center;margin:12px 0 20px;}
.result-fact-title{color:#ffd700;font-weight:700;margin-bottom:6px;font-size:clamp(13px,3vw,16px);}

/* notification */
#notif{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1a8c6ecc;color:#fff;padding:12px 24px;border-radius:20px;font-size:clamp(14px,3vw,18px);font-weight:700;pointer-events:none;opacity:0;transition:opacity .3s;z-index:999;}
</style>
</head>
<body>
<div id="game">

<!-- TITLE -->
<div class="screen" id="title-screen">
  <div class="wave-bg"></div>
  <div class="turtle-icon">🐢</div>
  <div class="title-logo">🌊 海洋守護者</div>
  <div class="title-sub">拯救藍色星球</div>
  <button class="btn" onclick="showScreen('level-screen')">開始冒險！</button>
  <button class="btn btn-small" onclick="showHowTo()">怎麼玩？</button>
</div>

<!-- LEVEL SELECT -->
<div class="screen hidden" id="level-screen">
  <div class="section-title">🗺️ 選擇關卡</div>
  <div class="level-grid">
    <div class="level-card unlocked" onclick="startLevel(1)">
      <div class="lc-icon">🏖️</div>
      <div class="lc-name">第1關<br>海灘清理</div>
      <div class="stars" id="stars-1">☆☆☆</div>
    </div>
    <div class="level-card" id="lcard-2" onclick="tryLevel(2)">
      <div class="lc-icon">🌊</div>
      <div class="lc-name">第2關<br>深海任務</div>
      <div class="stars" id="stars-2">☆☆☆</div>
    </div>
    <div class="level-card" id="lcard-3" onclick="tryLevel(3)">
      <div class="lc-icon">🪸</div>
      <div class="lc-name">第3關<br>珊瑚問答</div>
      <div class="stars" id="stars-3">☆☆☆</div>
    </div>
  </div>
  <div style="margin-top:20px;color:#a8e6d4;font-size:clamp(12px,2.5vw,14px);">總星星：<span id="total-stars-display">0</span> ⭐</div>
</div>

<!-- LEVEL 1 -->
<div class="screen hidden" id="level1-screen">
  <div id="hud" style="display:flex">
    <button class="hud-back" onclick="backToMenu()">◀ 返回</button>
    <div class="hud-level">第1關 海灘清理</div>
    <div class="hud-stars">⭐ <span id="l1-stars">0</span></div>
  </div>
  <div id="progress-bar"><div id="progress-fill" style="width:0%"></div></div>
  <div id="game-area" style="display:flex;flex-direction:column;justify-content:space-between;padding:0 8px 8px;">
    <div class="l1-top">
      <div class="l1-instruction">把垃圾拖到正確的垃圾桶！</div>
      <div class="trash-items" id="trash-items-container"></div>
    </div>
    <div class="l1-bottom">
      <div class="bins" id="bins-container">
        <div class="bin plastic" data-type="plastic" ondragover="e=>{e.preventDefault();this.classList.add('highlight')}" ondragleave="this.classList.remove('highlight')" ondrop="dropTrash(event,'plastic')">
          ♻️<div class="bin-label">塑膠回收</div>
        </div>
        <div class="bin organic" data-type="organic" ondragover="e=>{e.preventDefault();this.classList.add('highlight')}" ondragleave="this.classList.remove('highlight')" ondrop="dropTrash(event,'organic')">
          🍃<div class="bin-label">廚餘有機</div>
        </div>
        <div class="bin general" data-type="general" ondragover="e=>{e.preventDefault();this.classList.add('highlight')}" ondragleave="this.classList.remove('highlight')" ondrop="dropTrash(event,'general')">
          🗑️<div class="bin-label">一般垃圾</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- LEVEL 2 -->
<div class="screen hidden" id="level2-screen">
  <div id="hud" style="display:none"></div>
  <div style="position:absolute;top:0;left:0;right:0;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,#0a162899,transparent);z-index:10;">
    <button class="hud-back" onclick="backToMenu()">◀ 返回</button>
    <div class="hud-level">第2關 深海任務</div>
    <div class="hud-stars">⭐ <span id="l2-stars">0</span></div>
  </div>
  <div style="position:absolute;top:48px;left:16px;right:16px;height:8px;background:#ffffff22;border-radius:4px;z-index:10;"><div id="l2-progress-fill" style="height:100%;background:linear-gradient(90deg,#1a8c6e,#7ee8fa);border-radius:4px;transition:width .5s;width:0%"></div></div>
  <div class="l2-instruction">點擊海洋中的垃圾來清理！</div>
  <div class="l2-counter">已清理：<span id="l2-count">0</span> / <span id="l2-total">0</span></div>
  <div class="ocean-floor"></div>
  <div id="l2-items"></div>
</div>

<!-- LEVEL 3 -->
<div class="screen hidden" id="level3-screen">
  <div style="position:absolute;top:0;left:0;right:0;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;z-index:10;">
    <button class="hud-back" onclick="backToMenu()">◀ 返回</button>
    <div class="hud-level">第3關 珊瑚問答</div>
    <div class="hud-stars">⭐ <span id="l3-stars">0</span></div>
  </div>
  <div class="coral-deco" style="bottom:10px;left:5%">🪸</div>
  <div class="coral-deco" style="bottom:10px;right:8%">🪸</div>
  <div class="coral-deco" style="bottom:10px;left:35%">🐚</div>
  <div id="quiz-container" style="width:100%;max-width:480px;padding:0 12px;margin-top:60px;"></div>
</div>

<!-- RESULT -->
<div class="screen hidden" id="result-screen">
  <div style="font-size:clamp(50px,12vw,80px);margin-bottom:4px;">🐢</div>
  <div class="result-stars" id="result-stars-display">⭐⭐⭐</div>
  <div class="result-title" id="result-title">太棒了！</div>
  <div class="result-fact" id="result-fact-box"></div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
    <button class="btn btn-small" id="next-btn" onclick="goNext()">下一關 ➡️</button>
    <button class="btn btn-small" onclick="showScreen('level-screen')">關卡選擇</button>
  </div>
</div>

<div id="notif"></div>
</div>

<script>
const S={stars:[0,0,0],unlocked:[true,false,false]};

const TRASH=[
  {emoji:'🧴',label:'塑膠瓶',type:'plastic'},{emoji:'🛍️',label:'塑膠袋',type:'plastic'},
  {emoji:'🥤',label:'塑膠杯',type:'plastic'},{emoji:'🍌',label:'香蕉皮',type:'organic'},
  {emoji:'🥚',label:'蛋殼',type:'organic'},{emoji:'📰',label:'廢紙',type:'general'},
  {emoji:'💡',label:'舊燈泡',type:'general'},{emoji:'🧃',label:'果汁盒',type:'plastic'}
];
const OCEAN_TRASH=['🧴','🛍️','🥤','🎣','🥫','🧻','🪣'];
const QUIZ=[
  {q:'每年大約有多少塑膠垃圾流入海洋？',opts:['1萬噸','8百萬噸','50噸','100萬噸'],ans:1,fact:'🌊 每年約有800萬噸的塑膠垃圾進入海洋，相當於每分鐘倒入一卡車的塑膠！'},
  {q:'塑膠袋在海洋中分解需要多久？',opts:['1年','10年','100-500年','1個月'],ans:2,fact:'⏳ 一個塑膠袋在海洋中需要100到500年才能分解，期間還會釋放有毒物質！'},
  {q:'下列哪個行動最能減少海洋塑膠污染？',opts:['多用免洗餐具','自備購物袋和水壺','把垃圾丟入海中','多買瓶裝水'],ans:1,fact:'♻️ 自備購物袋和水壺是最有效的減塑方式，每人每年可減少數百個塑膠袋和瓶子！'},
  {q:'哪種動物最容易因塑膠袋而受傷？',opts:['海豚','海龜','鯊魚','螃蟹'],ans:1,fact:'🐢 海龜常把塑膠袋誤認為水母吃下去，導致窒息或腸胃阻塞，非常危險！'},
  {q:'「微塑膠」是什麼？',opts:['很大的塑膠','5mm以下的微小塑膠顆粒','可分解的塑膠','彩色塑膠'],ans:1,fact:'🔬 微塑膠是5毫米以下的細小塑膠，已經在魚類、飲用水甚至人體血液中被發現！'}
];
const FACTS=[
  {title:'🏖️ 海灘清理小知識',text:'每年全球有超過1000萬噸垃圾流入海洋。參與淨灘活動，可以直接保護海洋生態！'},
  {title:'🌊 深海任務小知識',text:'塑膠垃圾會纏住魚類、海龜和海鳥。海洋中已有超過5兆件塑膠垃圾，需要大家一起清理！'},
  {title:'🪸 珊瑚礁小知識',text:'珊瑚礁只佔海洋面積的0.1%，卻孕育了25%的海洋生物。減少塑膠，就是保護珊瑚礁的家！'}
];

let curLevel=0,dragEl=null,dragOff={x:0,y:0},l1Done=0,l2Done=0,l2Total=0,l2Stars=0,qIdx=0,qStars=0,qAnswered=false;

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}
function backToMenu(){showScreen('level-screen');updateLevelCards();}
function notify(msg){const n=document.getElementById('notif');n.textContent=msg;n.style.opacity='1';setTimeout(()=>n.style.opacity='0',1200);}

function updateLevelCards(){
  const starsMap=['☆☆☆','⭐☆☆','⭐⭐☆','⭐⭐⭐'];
  [1,2,3].forEach(i=>{
    const el=document.getElementById('stars-'+i);
    if(el)el.textContent=starsMap[S.stars[i-1]];
    const card=document.getElementById('lcard-'+i);
    if(card){
      if(S.unlocked[i-1]){card.classList.remove('locked');card.classList.add('unlocked');}
      else{card.classList.add('locked');card.classList.remove('unlocked');}
    }
  });
  document.getElementById('total-stars-display').textContent=S.stars.reduce((a,b)=>a+b,0);
}

function tryLevel(n){
  if(S.unlocked[n-1])startLevel(n);
  else notify('🔒 先完成前一關才能解鎖！');
}

function startLevel(n){
  curLevel=n;
  if(n===1)initLevel1();
  else if(n===2)initLevel2();
  else initLevel3();
}

/* ====== LEVEL 1 ====== */
function initLevel1(){
  showScreen('level1-screen');
  l1Done=0;
  document.getElementById('l1-stars').textContent='0';
  document.getElementById('progress-fill').style.width='0%';
  const c=document.getElementById('trash-items-container');
  c.innerHTML='';
  TRASH.forEach((t,i)=>{
    const d=document.createElement('div');
    d.className='trash-item';
    d.dataset.type=t.type;
    d.dataset.idx=i;
    d.title=t.label;
    d.textContent=t.emoji;
    d.draggable=true;
    d.addEventListener('dragstart',onDragStart);
    d.addEventListener('touchstart',onTouchStart,{passive:false});
    d.addEventListener('touchmove',onTouchMove,{passive:false});
    d.addEventListener('touchend',onTouchEnd);
    c.appendChild(d);
  });
  document.querySelectorAll('.bin').forEach(b=>{
    b.addEventListener('dragover',e=>{e.preventDefault();b.classList.add('highlight');});
    b.addEventListener('dragleave',()=>b.classList.remove('highlight'));
    b.addEventListener('drop',e=>dropTrash(e,b.dataset.type));
  });
}

function onDragStart(e){dragEl=e.currentTarget;e.dataTransfer.setData('text',dragEl.dataset.idx);}
function dropTrash(e,binType){
  e.preventDefault();
  document.querySelectorAll('.bin').forEach(b=>b.classList.remove('highlight'));
  const item=dragEl||document.querySelector('.trash-item.dragging');
  if(!item)return;
  checkTrash(item,binType);
  dragEl=null;
}

function onTouchStart(e){
  e.preventDefault();
  dragEl=e.currentTarget;
  dragEl.classList.add('dragging');
  const t=e.touches[0];
  const r=dragEl.getBoundingClientRect();
  dragOff={x:t.clientX-r.left,y:t.clientY-r.top};
  dragEl.style.position='fixed';
  dragEl.style.zIndex='999';
  dragEl.style.left=(t.clientX-dragOff.x)+'px';
  dragEl.style.top=(t.clientY-dragOff.y)+'px';
}
function onTouchMove(e){
  e.preventDefault();
  if(!dragEl)return;
  const t=e.touches[0];
  dragEl.style.left=(t.clientX-dragOff.x)+'px';
  dragEl.style.top=(t.clientY-dragOff.y)+'px';
}
function onTouchEnd(e){
  if(!dragEl)return;
  dragEl.classList.remove('dragging');
  dragEl.style.position='';dragEl.style.zIndex='';dragEl.style.left='';dragEl.style.top='';
  const t=e.changedTouches[0];
  const bins=document.querySelectorAll('.bin');
  let hit=null;
  bins.forEach(b=>{const r=b.getBoundingClientRect();if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom)hit=b;});
  if(hit){checkTrash(dragEl,hit.dataset.type);}
  dragEl=null;
}

function checkTrash(item,binType){
  if(item.dataset.type===binType){
    item.classList.add('collected');
    notify('✅ 答對了！');
    l1Done++;
    const stars=l1Done<=4?1:l1Done<=6?2:3;
    document.getElementById('l1-stars').textContent=stars;
    document.getElementById('progress-fill').style.width=(l1Done/TRASH.length*100)+'%';
    if(l1Done>=TRASH.length){
      const earned=l1Done>=8?3:l1Done>=6?2:1;
      setTimeout(()=>showResult(1,earned),600);
    }
  }else{
    notify('❌ 再想想看！');
    item.style.animation='shake .4s';
    setTimeout(()=>item.style.animation='',500);
  }
}

/* ====== LEVEL 2 ====== */
function initLevel2(){
  showScreen('level2-screen');
  l2Done=0;l2Stars=0;
  document.getElementById('l2-stars').textContent='0';
  document.getElementById('l2-progress-fill').style.width='0%';
  const c=document.getElementById('l2-items');c.innerHTML='';
  const items=[];
  for(let i=0;i<8;i++){
    const emoji=OCEAN_TRASH[Math.floor(Math.random()*OCEAN_TRASH.length)];
    const el=document.createElement('div');
    el.className='trash-ocean';
    el.textContent=emoji;
    el.style.left=Math.random()*75+5+'vw';
    el.style.top=Math.random()*45+20+'vh';
    el.addEventListener('click',()=>removeTrash(el));
    el.addEventListener('touchstart',ev=>{ev.preventDefault();removeTrash(el);},{passive:false});
    c.appendChild(el);items.push(el);
  }
  ['🐠','🐬','🐟'].forEach((a,i)=>{
    const el=document.createElement('div');
    el.className='animal';
    el.textContent=a;
    el.style.top=(30+i*15)+'vh';
    el.style.animationDelay=(i*2.5)+'s';
    el.style.fontSize=clamp(22,5.5,34);
    c.appendChild(el);
  });
  l2Total=items.length;
  document.getElementById('l2-total').textContent=l2Total;
  document.getElementById('l2-count').textContent='0';
}
function clamp(min,vw,max){return`clamp(${min}px,${vw}vw,${max}px)`;}
function removeTrash(el){
  if(el.classList.contains('removed'))return;
  el.classList.add('removed');
  l2Done++;
  const s=l2Done<=3?1:l2Done<=5?2:3;
  l2Stars=s;
  document.getElementById('l2-stars').textContent=s;
  document.getElementById('l2-count').textContent=l2Done;
  document.getElementById('l2-progress-fill').style.width=(l2Done/l2Total*100)+'%';
  notify('🌊 清理成功！');
  const bang=document.createElement('div');
  bang.className='caught-animation';
  bang.textContent='✨';
  bang.style.left=el.style.left;bang.style.top=el.style.top;
  document.getElementById('l2-items').appendChild(bang);
  setTimeout(()=>bang.remove(),700);
  if(l2Done>=l2Total){
    setTimeout(()=>showResult(2,l2Stars),700);
  }
}

/* ====== LEVEL 3 QUIZ ====== */
function initLevel3(){
  showScreen('level3-screen');
  qIdx=0;qStars=0;qAnswered=false;
  document.getElementById('l3-stars').textContent='0';
  renderQuiz();
}
function renderQuiz(){
  if(qIdx>=QUIZ.length){
    setTimeout(()=>showResult(3,qStars),400);return;
  }
  const q=QUIZ[qIdx];
  const c=document.getElementById('quiz-container');
  c.innerHTML=`
    <div class="quiz-card">
      <div class="quiz-q">${q.q}</div>
      <div class="quiz-options">${q.opts.map((o,i)=>`<button class="quiz-opt" onclick="answerQ(${i})" id="qopt-${i}">${o}</button>`).join('')}</div>
      <div class="quiz-fact" id="quiz-fact" style="display:none"></div>
      <div class="quiz-nav">
        <div class="quiz-progress">問題 ${qIdx+1} / ${QUIZ.length}</div>
        <button class="btn btn-small" id="qnext" style="display:none" onclick="nextQ()">下一題 ➡️</button>
      </div>
    </div>`;
  qAnswered=false;
}
function answerQ(i){
  if(qAnswered)return;
  qAnswered=true;
  const q=QUIZ[qIdx];
  const opts=document.querySelectorAll('.quiz-opt');
  opts.forEach((o,idx)=>{
    o.disabled=true;
    if(idx===q.ans)o.classList.add('correct');
    else if(idx===i)o.classList.add('wrong');
  });
  if(i===q.ans){
    notify('🎉 答對了！');qStars=Math.min(3,qStars+1);
    document.getElementById('l3-stars').textContent=qStars;
  }else notify('💡 再加油！');
  document.getElementById('quiz-fact').style.display='block';
  document.getElementById('quiz-fact').textContent=q.fact;
  document.getElementById('qnext').style.display='inline-block';
}
function nextQ(){qIdx++;renderQuiz();}

/* ====== RESULT ====== */
function showResult(level,stars){
  S.stars[level-1]=Math.max(S.stars[level-1],stars);
  if(level<3)S.unlocked[level]=true;
  const starsStr=['','⭐','⭐⭐','⭐⭐⭐'][stars];
  const titles=['','🎉 完成海灘清理！','🌊 深海任務成功！','🪸 珊瑚問答完成！'];
  document.getElementById('result-stars-display').textContent=starsStr;
  document.getElementById('result-title').textContent=titles[level];
  const f=FACTS[level-1];
  document.getElementById('result-fact-box').innerHTML=`<div class="result-fact-title">${f.title}</div>${f.text}`;
  const nb=document.getElementById('next-btn');
  if(level<3){nb.style.display='inline-block';}
  else{nb.style.display='none';}
  nb.onclick=()=>startLevel(level+1);
  showScreen('result-screen');
  updateLevelCards();
}

function showHowTo(){
  alert('🌊 怎麼玩？\n\n第1關：把垃圾拖到正確的垃圾桶\n第2關：點擊海洋中的垃圾清理乾淨\n第3關：回答海洋保護的問題\n\n每關最多得3顆星！\n收集星星，解鎖下一關！🐢');
}

function goNext(){document.getElementById('next-btn').onclick();}

updateLevelCards();
</script>
